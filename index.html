<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NutriTrack</title>
<style>
body { font-family: Arial; padding:20px; }
.card { border:1px solid #ccc; padding:10px; margin:5px; border-radius:8px; }
button { margin-top:5px; }
</style>
</head>
<body>

<h1>NutriTrack</h1>

<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA8e1E3PTO6cdN68uwL5HwmWA4iIYzxcYg",
  authDomain: "nutritrack-92e2b.firebaseapp.com",
  projectId: "nutritrack-92e2b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentProfileId = localStorage.getItem("currentProfile") || null;

function todayKey() {
  return new Date().toISOString().slice(0,10);
}

// ================= PROFILE =================
async function createProfile(name, goal) {
  const id = "p_" + Date.now();

  await setDoc(doc(db, "profiles", id), {
    id, name, goal, since: todayKey()
  });

  localStorage.setItem("currentProfile", id);
  currentProfileId = id;
}

async function getProfiles() {
  const snap = await getDocs(collection(db, "profiles"));
  const res = {};
  snap.forEach(d => res[d.id] = d.data());
  return res;
}

// ================= FOODS =================
async function getFoods() {
  const snap = await getDocs(collection(db, "foods"));
  const foods = [];
  snap.forEach(d => foods.push(d.data()));
  return foods;
}

async function saveFood(food) {
  await setDoc(doc(db, "foods", food.id), food);
}

// ================= LOG =================
async function getTodayLog() {
  if (!currentProfileId) return [];

  const q = query(
    collection(db, "logs"),
    where("profileId", "==", currentProfileId),
    where("date", "==", todayKey())
  );

  const snap = await getDocs(q);
  let log = [];
  snap.forEach(d => log = d.data().entries);
  return log;
}

async function saveTodayLog(entries) {
  await setDoc(doc(db, "logs", currentProfileId + "_" + todayKey()), {
    profileId: currentProfileId,
    date: todayKey(),
    entries
  });
}

async function addFoodToLog(food) {
  const log = await getTodayLog();

  log.push({
    foodId: food.id,
    foodName: food.name,
    kcal: food.kcal
  });

  await saveTodayLog(log);
  render();
}

// ================= UI =================
async function render() {
  const appDiv = document.getElementById("app");

  if (!currentProfileId) {
    appDiv.innerHTML = `
      <h2>Créer un profil</h2>
      <input id="name" placeholder="Nom">
      <input id="goal" type="number" placeholder="Objectif kcal">
      <button onclick="createProfileUI()">Créer</button>
    `;
    return;
  }

  const foods = await getFoods();
  const log = await getTodayLog();

  appDiv.innerHTML = `
    <h2>Profil actif</h2>
    <button onclick="addFoodUI()">+ Aliment</button>

    <h3>Catalogue</h3>
    ${foods.map(f => `
      <div class="card">
        <b>${f.name}</b> - ${f.kcal} kcal
        <br>
        <button onclick="selectFood('${f.id}')">Ajouter</button>
      </div>
    `).join('')}

    <h3>Aujourd'hui</h3>
    ${log.map(l => `
      <div class="card">
        ${l.foodName} - ${l.kcal} kcal
      </div>
    `).join('')}
  `;

  window.selectFood = async (id) => {
    const foods = await getFoods();
    const food = foods.find(f => f.id === id);
    if (food) addFoodToLog(food);
  };
}

// ================= UI ACTIONS =================
window.createProfileUI = async () => {
  const name = document.getElementById("name").value;
  const goal = parseInt(document.getElementById("goal").value);

  await createProfile(name, goal);
  render();
};

window.addFoodUI = async () => {
  const name = prompt("Nom aliment");
  const kcal = parseInt(prompt("Calories"));

  await saveFood({
    id: "f_" + Date.now(),
    name,
    kcal
  });

  render();
};

// INIT
render();

</script>

</body>
</html>
